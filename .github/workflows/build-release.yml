name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ruledone-windows
          - os: macos-latest
            artifact_name: ruledone-macos

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Determine version
        id: version
        run: |
          RAW="${{ github.ref_name }}"
          # 如果是 v1.2.3 格式的标签，去掉 v 前缀
          # 否则生成一个基于日期和 commit 的开发版号
          if [[ "$RAW" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "value=${RAW#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.0-dev+$(date +%Y%m%d).${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare macOS icon
        if: runner.os == 'macOS'
        run: |
          if [ ! -f resources/icons/logo.png ]; then
            echo "resources/icons/logo.png not found, skipping macOS icon generation"
            exit 0
          fi
          mkdir -p resources/icons/icon.iconset
          sips -z 16 16 resources/icons/logo.png --out resources/icons/icon.iconset/icon_16x16.png
          sips -z 32 32 resources/icons/logo.png --out resources/icons/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 resources/icons/logo.png --out resources/icons/icon.iconset/icon_32x32.png
          sips -z 64 64 resources/icons/logo.png --out resources/icons/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 resources/icons/logo.png --out resources/icons/icon.iconset/icon_128x128.png
          sips -z 256 256 resources/icons/logo.png --out resources/icons/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 resources/icons/logo.png --out resources/icons/icon.iconset/icon_256x256.png
          sips -z 512 512 resources/icons/logo.png --out resources/icons/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 resources/icons/logo.png --out resources/icons/icon.iconset/icon_512x512.png
          sips -z 1024 1024 resources/icons/logo.png --out resources/icons/icon.iconset/icon_512x512@2x.png
          iconutil -c icns resources/icons/icon.iconset -o resources/icons/logo.icns

      - name: Build package
        run: pyinstaller --noconfirm --clean main.spec

      - name: Build installer (Windows)
        # 仅在有语义化版本标签时构建安装程序，避免 workflow_dispatch 时
        # github.ref_name 为分支名（可能含特殊字符如 /）导致 iscc 解析失败
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        # 使用 cmd 而非 bash，避免 MSYS2 自动将 /D 参数转换为 Windows 路径
        shell: cmd
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}
        run: |
          where iscc >nul 2>&1
          if %errorlevel% neq 0 exit /b 1
          if not exist installer.iss exit /b 1
          if not exist dist\RuleDone exit /b 1

          REM InnoSetup 6.7.1 可能未附带 ChineseSimplified.isl，从上游仓库下载
          if not exist "Languages\ChineseSimplified.isl" (
              if not exist "Languages" mkdir "Languages"
              echo Downloading ChineseSimplified.isl...
              curl -sL -o "Languages\ChineseSimplified.isl" "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl"
          )

          iscc "/DMyAppVersion=%APP_VERSION%" installer.iss

      - name: Package bundle
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          python - <<'PY'
          import os, shutil
          from pathlib import Path

          dist_dir = Path('dist')
          candidates = [dist_dir / 'RuleDone.app', dist_dir / 'RuleDone']
          target = next((item for item in candidates if item.exists()), None)
          if target is None:
              raise SystemExit('No PyInstaller bundle found under dist/')

          suffix = '-macos' if target.suffix == '.app' else '-windows'
          version = os.environ.get('VERSION', '').strip()
          version_tag = f'-{version}' if version else ''
          archive_name = f'RuleDone{version_tag}{suffix}'

          release_dir = Path('release')
          release_dir.mkdir(parents=True, exist_ok=True)

          # 创建 .zip 压缩包（用于 GitHub Release 分发 & artifact 上传）
          shutil.make_archive(str(release_dir / archive_name), 'zip', root_dir=dist_dir, base_dir=target.name)

          # 也将安装程序复制到 release 目录
          installer_dir = Path('installer')
          if installer_dir.exists():
              for f in installer_dir.glob('*.exe'):
                  shutil.copy2(f, release_dir / f.name)
          PY

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          version="${VERSION}"
          version_tag="${version:+-${version}}"
          dmg_name="RuleDone${version_tag}-macos.dmg"

          # 创建临时目录，放入 .app 和 Applications 快捷方式
          dmg_dir=$(mktemp -d)
          cp -R dist/RuleDone.app "$dmg_dir/"
          ln -s /Applications "$dmg_dir/Applications"

          # 使用 hdiutil 创建压缩 DMG
          hdiutil create \
            -srcfolder "$dmg_dir" \
            -volname "入档" \
            -format UDZO \
            -ov \
            "release/$dmg_name"

          rm -rf "$dmg_dir"
          echo "DMG created: release/$dmg_name"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
          generate_release_notes: true
